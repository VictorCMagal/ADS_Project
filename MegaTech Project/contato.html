<div class="container-contato">

    <h2 class="form-titulo">Contato</h2>

    <label class="label">Nome:</label>
    <input class="input" type="text" name="nome" id="" placeholder="Seu nome aqui." required><br>

    <label class="label">Email:</label>
    <input class="input" type="email" name="email" id="" placeholder="Campo de Email" required><br>

    <label class="label">Telefone:</label>
    <input class="input" type="tel" name="telefone" id="" placeholder="8888-8888" required><br>
    
    <label class="label">Serviço:</label>
    <select class="select" name="servico" id="">
        <option value="light">Web</option>
        <option value="padrao">UI</option>
        <option value="premium">Premium</option>
        <option value="pro">PRO</option>
    </select><br>
        
    <label class="label">Mensagem:</label>
    <textarea class="textarea" type="mensagem" rows="5" cols="30" value="Escreva algo aqui."></textarea><br>

<div class="checkbox-group">    
    <label >Aceite os Termos:</label>    
    <input type="checkbox" type="checkbox" name="checkbox" id="" required><label>YES!</label><br>
</div>
    
    <button class="botao">Enviar</button>
</div>
